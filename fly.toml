# fly.toml — nba-nfl-hub on Fly.io
# Fly.io runs on Equinix Metal (96% renewable energy)

app = "nba-nfl-hub"
primary_region = "ord"   # Chicago — central US, low latency for your users

[build]
  # No build step — vanilla JS, nothing to compile

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true   # free-tier: machine sleeps when idle
  auto_start_machines = true  # wakes automatically on request
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
